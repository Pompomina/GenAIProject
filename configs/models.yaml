# Model-specific hyperparameters and metadata

mlp:
  input_dim: 129       # 128 RAM bytes + 1 action (scalar)
  output_dim: 128
  hidden_dim: 256
  n_layers: 3
  activation: relu
  lr: 1.0e-3
  train_steps: 200000
  batch_size: 256

dreamerv3:
  obs_shape: [84, 84, 3]
  # JAX checkpoint; inference handled by scripts/dreamerv3_rollout.py in env_jax

iris:
  obs_shape: [84, 84, 3]
  # PyTorch checkpoint; see src/models/iris_wrapper.py

diamond:
  obs_shape: [84, 84, 3]
  # PyTorch checkpoint; see src/models/diamond_wrapper.py
